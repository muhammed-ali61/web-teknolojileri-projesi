  <main class="container my-5">

    <h2>Kütüphane</h2>

    <div class="d-flex gap-2 mb-4">
      <input type="text" id="aramaInput" class="form-control" placeholder="Kitap adı veya yazar ara...">
      <button class="btn btn-dark" onclick="kitapAra()">
        <i class="fas fa-search"></i> Ara
      </button>
    </div>

    <div class="row g-4" id="kitapSonuclari"></div>
        
        

  </main>

  <script>

  document.getElementById('aramaInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') kitapAra();
   });


  async function kitapAra() {
    const aramaTermi = document.getElementById('aramaInput').value.trim();
    if (aramaTermi === '') {
      alert('Lütfen bir arama terimi girin!');
      return;
    }

    const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(aramaTermi)}&limit=12`;
    const response = await fetch(url);
    const data = await response.json();

    const container = document.getElementById('kitapSonuclari');
    container.innerHTML = '';

    if (data.docs.length === 0) {
  container.innerHTML = '<p class="text-muted">Sonuç bulunamadı.</p>';
  return;
  }

    data.docs.forEach(kitap => {
      const kapak = kitap.cover_i
        ? `https://covers.openlibrary.org/b/id/${kitap.cover_i}-M.jpg`
        : 'https://placehold.co/200x260?text=Kapak+Yok';

      container.innerHTML += `
        <div class="col-md-3 col-6">
          <div class="card h-100 hobi-kart-yeni">
            <img src="${kapak}" class="card-img-top" style="height:500px; object-fit:cover;">
            <div class="card-body">
              <h6 class="card-title">${kitap.title}</h6>
              <p class="card-text text-muted small">${kitap.author_name ? kitap.author_name[0] : 'Bilinmiyor'}</p>
            </div>
          </div>
        </div>`;
    });
  }
</script>
