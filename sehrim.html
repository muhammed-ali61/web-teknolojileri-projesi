<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web Projesi</title>
</head>
<body>
    
<!-- HOBİLER BÖLÜMÜ -->
<section class="mb-5">
  <h2 class="mb-4">Hobiler & İlgi Alanları</h2>
  <div class="row g-3">

    <div class="col-md-3">
      <div class="card text-center p-3 h-100 kart-fotograf">
        <i class="fas fa-camera fa-2x mb-2"></i>
        <h5>Fotoğrafçılık</h5>
        <p class="small">Gece çekimleri ve doğa fotoğrafçılığı</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 h-100 kart-spor">
        <i class="fas fa-futbol fa-2x mb-2"></i>
        <h5>Spor</h5>
        <p class="small">Trabzonspor taraftarı</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 h-100 kart-kitap">
        <i class="fas fa-book fa-2x mb-2"></i>
        <h5>Kitap</h5>
        <p class="small">Okuma alışkanlığı</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-center p-3 h-100 kart-muzik">
        <i class="fas fa-music fa-2x mb-2"></i>
        <h5>Müzik</h5>
        <p class="small">Müzik dinleme zevki</p>
      </div>
    </div>

  </div>
</section>




</body>
</html>
