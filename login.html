    <div class="col-md-5">
      <div class="iletisim-form-kart">
        <h2 class="mb-4">Üye Girişi</h2>
         <form action="PHP/login.php" method="POST" onsubmit="return jsKontrol()">

        <div class="mb-3">
          <label for="kullanici" class="form-label">Kullanıcı Adı</label>
          <input type="email" id="kullanici" name="kullanici" class="form-control" placeholder="Öğreci Numaranız@sakarya.edu.tr">
        </div> 

        <div class="mb-3">
          <label for="sifre" class="form-label">Şifre</label>
          <input type="password" id="sifre" name="sifre" class="form-control" placeholder="********">
        </div>

        <button type="submit" class="btn btn-dark w-100">
          <i class="fas fa-sign-in-alt me-2"></i> Giriş Yap
        </button>


        </form>
      </div>
    </div>
  </div>
</main>

<script>

function jsKontrol(){

  let kullanici = document.getElementById('kullanici').value.trim();
  let sifre = document.getElementById('sifre').value.trim();


  if(kullanici === '' || sifre === '') {

    alert('Boş alan bırakılamaz!');
      return false;
  }
  
  if (!kullanici.includes('@sakarya.edu.tr')) {
      alert('Geçerli bir mail adresi giriniz!');
      return false;
    }

    return true;
  }
</script>
